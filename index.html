<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gold Potato Clicker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a00;
      color: #f5c518;
      font-family: 'Press Start 2P', monospace;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ───── LEFT PANEL ───── */
    #left-panel {
      width: 320px;
      min-width: 260px;
      background: #111100;
      border-right: 3px solid #f5c518;
      display: flex;
      flex-direction: column;
      padding: 18px 14px;
      gap: 16px;
    }

    #currency-bar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #currency-icon {
      width: 36px;
      height: 36px;
      image-rendering: pixelated;
      object-fit: contain;
    }

    #currency-count {
      font-size: 22px;
      color: #f5c518;
      text-shadow: 0 0 8px #f5c51888;
    }

    #shop-title {
      font-size: 13px;
      color: #f5c518;
      letter-spacing: 3px;
      border-bottom: 2px solid #f5c51855;
      padding-bottom: 8px;
    }

    #shop-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      flex: 1;
    }

    #shop-items::-webkit-scrollbar { width: 4px; }
    #shop-items::-webkit-scrollbar-track { background: #111100; }
    #shop-items::-webkit-scrollbar-thumb { background: #f5c51855; border-radius: 2px; }

    .shop-item {
      background: #1a1800;
      border: 2px solid #f5c51833;
      border-radius: 4px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .shop-item:hover {
      border-color: #f5c518aa;
      background: #221f00;
    }

    .shop-item.purchased {
      border-color: #f5c518;
      background: #2a2200;
      cursor: default;
    }

    .shop-item.purchased:hover {
      border-color: #f5c518;
      background: #2a2200;
    }

    .shop-item .item-icon {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
      object-fit: contain;
      flex-shrink: 0;
    }

    .shop-item-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .item-name {
      font-size: 8px;
      color: #f5c518cc;
    }

    .item-desc {
      font-size: 6px;
      color: #f5c51666;
    }

    .item-price {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 8px;
      color: #f5c51888;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .item-price img {
      width: 14px;
      height: 14px;
      image-rendering: pixelated;
      object-fit: contain;
    }

    .item-price.cant-afford {
      color: #884400aa;
      opacity: 0.5;
    }

    .shop-item.purchased .item-price {
      color: #f5c518;
    }

    /* ───── RIGHT PANEL ───── */
    #right-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: radial-gradient(ellipse at center, #1a1500 0%, #0a0a00 70%);
      user-select: none;
    }

    #potato-img {
      width: 220px;
      height: 220px;
      image-rendering: pixelated;
      transition: transform 0.08s;
      filter: drop-shadow(0 0 28px #f5c51866);
    }

    #right-panel:active #potato-img {
      transform: scale(0.91);
    }

    #right-panel::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, #f5c51814 0%, transparent 70%);
      pointer-events: none;
    }

    /* ───── UPGRADES ───── */
    /* Altın Havuç — patatese göre sağ */
    #upgrade-carrot {
      position: absolute;
      right: calc(50% - 230px);
      top: 50%;
      transform: translateY(-50%);
      display: none;
      pointer-events: none;
    }

    /* Altın Ekmek — patatese göre sol */
    #upgrade-bread {
      position: absolute;
      left: calc(50% - 230px);
      top: 50%;
      transform: translateY(-50%);
      display: none;
      pointer-events: none;
    }

    /* Altın Yumurta — üstte ortada */
    #upgrade-egg {
      position: absolute;
      top: calc(50% - 230px);
      left: 50%;
      transform: translateX(-50%);
      display: none;
      pointer-events: none;
    }

    .upgrade-icon {
      width: 220px;
      height: 220px;
      image-rendering: pixelated;
      object-fit: contain;
      filter: drop-shadow(0 0 14px #f5c51866);
    }

    /* ───── FLOAT LABELS ───── */
    .float-label {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #f5c518;
      text-shadow: 0 0 6px #f5c518bb;
      pointer-events: none;
      animation: floatUp var(--dur, 1.1s) ease-out forwards;
      white-space: nowrap;
    }

    .float-label img {
      width: 18px;
      height: 18px;
      image-rendering: pixelated;
      object-fit: contain;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) translateX(var(--dx, 0px)) scale(1); }
      15%  { transform: translateY(calc(var(--rise, -110px) * 0.1)) translateX(calc(var(--dx, 0px) * 0.3)) scale(1.15); }
      100% { opacity: 0; transform: translateY(var(--rise, -110px)) translateX(var(--dx, 0px)) scale(0.8); }
    }
  </style>
</head>
<body>

<!-- LEFT -->
<div id="left-panel">
  <div id="currency-bar">
    <img id="currency-icon" src="potato.png" alt="potato" />
    <span id="currency-count">0</span>
  </div>
  <div id="shop-title">SHOP</div>
  <div id="shop-items">

    <!-- Altın Havuç -->
    <div class="shop-item" id="item-golden-carrot" onclick="buyItem('golden-carrot')">
      <img class="item-icon" src="Golden_Carrot_JE4_BE2.png" alt="Altın Havuç" />
      <div class="shop-item-info">
        <span class="item-name">Altın Havuç</span>
        <span class="item-desc">Tıklama +1 (sağda)</span>
      </div>
      <span class="item-price" id="price-golden-carrot">
        500 <img src="potato.png" alt="patates" />
      </span>
    </div>

    <!-- Altın Ekmek -->
    <div class="shop-item" id="item-golden-bread" onclick="buyItem('golden-bread')">
      <img class="item-icon" src="golden_bread.png" alt="Altın Ekmek" />
      <div class="shop-item-info">
        <span class="item-name">Altın Ekmek</span>
        <span class="item-desc">Tıklama +1 (sol yan)</span>
      </div>
      <span class="item-price" id="price-golden-bread">
        500 <img src="potato.png" alt="patates" />
      </span>
    </div>

    <!-- Altın Yumurta -->
    <div class="shop-item" id="item-golden-egg" onclick="buyItem('golden-egg')">
      <img class="item-icon" src="golden_egg.png" alt="Altın Yumurta" />
      <div class="shop-item-info">
        <span class="item-name">Altın Yumurta</span>
        <span class="item-desc">Tıklamayı 2x katlar</span>
      </div>
      <span class="item-price" id="price-golden-egg">
        5000 <img src="potato.png" alt="patates" />
      </span>
    </div>

    <div class="shop-item" style="cursor:default">
      <img class="item-icon" src="potato.png" alt="" style="opacity:0.2;filter:grayscale(1)" />
      <div class="shop-item-info"><span class="item-name">-</span><span class="item-desc">Yakında</span></div>
      <span class="item-price">Fiyat: -</span>
    </div>
    <div class="shop-item" style="cursor:default">
      <img class="item-icon" src="potato.png" alt="" style="opacity:0.2;filter:grayscale(1)" />
      <div class="shop-item-info"><span class="item-name">-</span><span class="item-desc">Yakında</span></div>
      <span class="item-price">Fiyat: -</span>
    </div>

  </div>
</div>

<!-- RIGHT -->
<div id="right-panel">
  <img id="potato-img" src="potato.png" alt="potato" draggable="false" />

  <!-- Altın Havuç: sol alt -->
  <div id="upgrade-carrot">
    <img class="upgrade-icon" src="Golden_Carrot_JE4_BE2.png" alt="Altın Havuç" />
  </div>

  <!-- Altın Ekmek: patatese göre sol -->
  <div id="upgrade-bread">
    <img class="upgrade-icon" src="golden_bread.png" alt="Altın Ekmek" />
  </div>

  <!-- Altın Yumurta: üstte orta -->
  <div id="upgrade-egg">
    <img class="upgrade-icon" src="golden_egg.png" alt="Altın Yumurta" />
  </div>
</div>

<script>
  let count      = 0;
  let hasCarrot  = false;
  let hasBread   = false;
  let hasEgg     = false;
  const countEl  = document.getElementById('currency-count');
  const panel    = document.getElementById('right-panel');

  function getClickValue() {
    let val = 1;
    if (hasCarrot) val += 1;
    if (hasBread)  val += 1;
    if (hasEgg)    val *= 2;
    return val;
  }

  panel.addEventListener('click', (e) => {
    const val = getClickValue();
    count += val;
    countEl.textContent = count;
    spawnFloat(e, val);
    updateShopPrices();
  });

  const ITEMS = {
    'golden-carrot': {
      price: 500,
      onBuy() {
        hasCarrot = true;
        document.getElementById('upgrade-carrot').style.display = 'block';
      }
    },
    'golden-bread': {
      price: 500,
      onBuy() {
        hasBread = true;
        document.getElementById('upgrade-bread').style.display = 'block';
      }
    },
    'golden-egg': {
      price: 5000,
      onBuy() {
        hasEgg = true;
        document.getElementById('upgrade-egg').style.display = 'block';
      }
    }
  };

  function buyItem(id) {
    const item = ITEMS[id];
    if (!item || item.bought) return;
    if (count < item.price) return;

    count -= item.price;
    item.bought = true;
    countEl.textContent = count;
    item.onBuy();

    const el = document.getElementById('item-' + id);
    el.classList.add('purchased');
    el.onclick = null;

    const priceEl = document.getElementById('price-' + id);
    priceEl.innerHTML = '✔ Alındı';

    updateShopPrices();
  }

  function updateShopPrices() {
    for (const [id, item] of Object.entries(ITEMS)) {
      if (item.bought) continue;
      const priceEl = document.getElementById('price-' + id);
      if (!priceEl) continue;
      priceEl.classList.toggle('cant-afford', count < item.price);
    }
  }

  function spawnFloat(e, val) {
    const rect  = panel.getBoundingClientRect();
    const label = document.createElement('div');
    label.className = 'float-label';

    const miniImg = document.createElement('img');
    miniImg.src = 'potato.png';

    const txt = document.createElement('span');
    txt.textContent = '+' + val;

    label.appendChild(miniImg);
    label.appendChild(txt);

    const dx   = (Math.random() * 80 - 40).toFixed(0) + 'px';
    const rise = -(Math.random() * 100 + 80).toFixed(0) + 'px';
    const dur  = (Math.random() * 0.55 + 0.85).toFixed(2) + 's';

    label.style.setProperty('--dx',   dx);
    label.style.setProperty('--rise', rise);
    label.style.setProperty('--dur',  dur);

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    label.style.left   = Math.min(Math.max(x - 20, 8), rect.width  - 80) + 'px';
    label.style.bottom = Math.max(rect.height - y, 8) + 'px';

    panel.appendChild(label);
    label.addEventListener('animationend', () => label.remove());
  }
</script>
</body>
</html>
