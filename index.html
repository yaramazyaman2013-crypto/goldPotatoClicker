<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gold Potato Clicker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a00;
      color: #f5c518;
      font-family: 'Press Start 2P', monospace;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    #left-panel {
      width: 340px;
      min-width: 280px;
      background: #111100;
      border-right: 3px solid #f5c518;
      display: flex;
      flex-direction: column;
      padding: 18px 14px;
      gap: 16px;
    }

    #currency-bar { display: flex; align-items: center; gap: 10px; }
    #currency-icon { width: 36px; height: 36px; image-rendering: pixelated; object-fit: contain; }
    #currency-count { font-size: 22px; color: #f5c518; text-shadow: 0 0 8px #f5c51888; }

    #shop-title {
      font-size: 13px; color: #f5c518; letter-spacing: 3px;
      border-bottom: 2px solid #f5c51855; padding-bottom: 8px;
    }

    #shop-items { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; }
    #shop-items::-webkit-scrollbar { width: 4px; }
    #shop-items::-webkit-scrollbar-track { background: #111100; }
    #shop-items::-webkit-scrollbar-thumb { background: #f5c51855; border-radius: 2px; }

    .shop-item {
      background: #1a1800; border: 2px solid #f5c51833;
      border-radius: 4px; padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: border-color .15s, background .15s;
    }
    .shop-item:hover { border-color: #f5c518aa; background: #221f00; }
    .shop-item.purchased { border-color: #f5c518; background: #2a2200; cursor: default; }
    .shop-item.purchased:hover { border-color: #f5c518; background: #2a2200; }

    .shop-item .item-icon {
      width: 34px; height: 34px;
      image-rendering: pixelated; object-fit: contain; flex-shrink: 0;
    }

    .shop-item-info {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 7px;
    }
    .item-name  { font-size: 8px; color: #f5c518cc; white-space: nowrap; }
    .item-desc  { font-size: 6px; color: #f5c51666; line-height: 1.6; }

    .item-price {
      display: flex; align-items: center; gap: 4px;
      font-size: 8px; color: #f5c51888;
      white-space: nowrap; flex-shrink: 0;
    }
    .item-price img { width: 14px; height: 14px; image-rendering: pixelated; object-fit: contain; }
    .item-price.cant-afford { opacity: 0.4; }
    .shop-item.purchased .item-price { color: #f5c518; }

    /* ── RIGHT PANEL ── */
    #right-panel {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden; cursor: pointer;
      background: radial-gradient(ellipse at center, #1a1500 0%, #0a0a00 70%);
      user-select: none;
    }
    #right-panel::before {
      content: ''; position: absolute;
      width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, #f5c51814 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── CLICKABLE ITEMS (potato, carrot, bread, egg) ── */
    /* All use JS .clicking class for scale animation — no :active override */
    #potato-img {
      width: 220px; height: 220px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 0 28px #f5c51866);
      position: relative; z-index: 2;
      transition: transform 0.08s ease;
    }
    #potato-img.clicking { transform: scale(0.91); }

    /* side upgrades — vertically centered, close to potato */
    .side-upgrade {
      position: absolute;
      width: 200px; height: 200px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 0 14px #f5c51866);
      top: 50%; transform: translateY(-50%);
      display: none;
      transition: transform 0.08s ease;
    }
    .side-upgrade.clicking { transform: translateY(-50%) scale(0.91); }

    /* 50px gap from potato edges */
    #upgrade-bread  { right: calc(50% + 160px); }
    #upgrade-carrot { left:  calc(50% + 160px); }

    /* egg — bottom center, same size as potato */
    #upgrade-egg {
      position: absolute;
      width: 220px; height: 220px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 0 14px #f5c51866);
      bottom: 80px; left: 50%; transform: translateX(-50%);
      display: none;
      transition: transform 0.08s ease;
    }
    #upgrade-egg.clicking { transform: translateX(-50%) scale(0.91); }

    /* ── ANIMALS — bottom left side by side ── */
    .animal-icon {
      position: absolute; bottom: 16px;
      width: 70px; height: 70px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 0 8px #f5c51844);
      display: none; pointer-events: none;
      transition: transform 0.12s ease;
    }
    #animal-chicken { left: 16px; }
    #animal-pig     { left: 96px; }

    .animal-icon.bounce { transform: translateY(-12px); }

    /* ── PASSIVE NOTIF ── */
    #passive-notif {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1800; border: 2px solid #f5c518;
      color: #f5c518; font-size: 8px;
      padding: 8px 16px; border-radius: 6px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s; z-index: 99;
      white-space: nowrap;
    }

    /* ── FLOAT LABELS ── */
    .float-label {
      position: absolute; display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: #f5c518; text-shadow: 0 0 6px #f5c518bb;
      pointer-events: none;
      animation: floatUp var(--dur,1.1s) ease-out forwards;
      white-space: nowrap;
    }
    .float-label img { width: 18px; height: 18px; image-rendering: pixelated; object-fit: contain; }
    @keyframes floatUp {
      0%   { opacity:1; transform:translateY(0) translateX(var(--dx,0px)); }
      100% { opacity:0; transform:translateY(var(--rise,-110px)) translateX(var(--dx,0px)); }
    }
  </style>
</head>
<body>

<!-- LEFT -->
<div id="left-panel">
  <div id="currency-bar">
    <img id="currency-icon" src="potato.png" alt="potato" />
    <span id="currency-count">0</span>
  </div>
  <div id="shop-title">SHOP</div>
  <div id="shop-items">

    <div class="shop-item" id="item-golden-carrot" onclick="buyItem('golden-carrot')">
      <img class="item-icon" src="golden_carrot.png" alt="Altın Havuç" />
      <div class="shop-item-info">
        <span class="item-name">Altın Havuç</span>
        <span class="item-desc">Tıklama +1 · sağda</span>
      </div>
      <span class="item-price" id="price-golden-carrot">500 <img src="potato.png" alt="" /></span>
    </div>

    <div class="shop-item" id="item-golden-bread" onclick="buyItem('golden-bread')">
      <img class="item-icon" src="golden_bread.png" alt="Altın Ekmek" />
      <div class="shop-item-info">
        <span class="item-name">Altın Ekmek</span>
        <span class="item-desc">Tıklama +1 · solda</span>
      </div>
      <span class="item-price" id="price-golden-bread">500 <img src="potato.png" alt="" /></span>
    </div>

    <div class="shop-item" id="item-golden-egg" onclick="buyItem('golden-egg')">
      <img class="item-icon" src="goldenegg2.png" alt="Altın Yumurta" />
      <div class="shop-item-info">
        <span class="item-name">Altın Yumurta</span>
        <span class="item-desc">Tıklamayı 2x katlar</span>
      </div>
      <span class="item-price" id="price-golden-egg">1000 <img src="potato.png" alt="" /></span>
    </div>

    <div class="shop-item" id="item-chicken" onclick="buyItem('chicken')">
      <img class="item-icon" src="chicken.png" alt="Tavuk" />
      <div class="shop-item-info">
        <span class="item-name">Tavuk</span>
        <span class="item-desc">1dk'da +1000 patates</span>
      </div>
      <span class="item-price" id="price-chicken">5000 <img src="potato.png" alt="" /></span>
    </div>

    <div class="shop-item" id="item-pig" onclick="buyItem('pig')">
      <img class="item-icon" src="pig.png" alt="Domuz" />
      <div class="shop-item-info">
        <span class="item-name">Domuz</span>
        <span class="item-desc">1.5sn'de otomatik tık
5dk'da 50 patates yer</span>
      </div>
      <span class="item-price" id="price-pig">5000 <img src="potato.png" alt="" /></span>
    </div>

  </div>
</div>

<!-- RIGHT -->
<div id="right-panel">
  <img class="side-upgrade" id="upgrade-bread"  src="golden_bread.png"          alt="Altın Ekmek"   draggable="false" />
  <img id="potato-img"                           src="potato.png"                alt="potato"        draggable="false" />
  <img class="side-upgrade" id="upgrade-carrot"  src="golden_carrot.png" alt="Altın Havuç"   draggable="false" />
  <img id="upgrade-egg"                          src="goldenegg2.png"            alt="Altın Yumurta" draggable="false" />
  <img class="animal-icon"  id="animal-chicken"  src="chicken.png"               alt="Tavuk" />
  <img class="animal-icon"  id="animal-pig"      src="pig.png"                   alt="Domuz" />
</div>

<div id="passive-notif"></div>

<script>
  let count     = 0;
  let hasCarrot = false, hasBread = false, hasEgg = false;
  let hasChicken = false, hasPig = false;

  const countEl = document.getElementById('currency-count');
  const panel   = document.getElementById('right-panel');
  const notif   = document.getElementById('passive-notif');

  function getClickValue() {
    let v = 1;
    if (hasCarrot) v += 1;
    if (hasBread)  v += 1;
    if (hasEgg)    v *= 2;
    return v;
  }

  // ── Click animation via JS class (no :active jitter) ──────────────────────
  const clickables = [
    document.getElementById('potato-img'),
    document.getElementById('upgrade-bread'),
    document.getElementById('upgrade-carrot'),
    document.getElementById('upgrade-egg'),
  ];

  panel.addEventListener('mousedown', () => {
    clickables.forEach(el => { if (el.style.display !== 'none') el.classList.add('clicking'); });
  });
  panel.addEventListener('mouseup',    stopClick);
  panel.addEventListener('mouseleave', stopClick);
  function stopClick() {
    clickables.forEach(el => el.classList.remove('clicking'));
  }

  panel.addEventListener('click', (e) => {
    const val = getClickValue();
    count += val;
    countEl.textContent = count;
    spawnFloat(e, val);
    updateShopPrices();
  });

  // ── Shop items ─────────────────────────────────────────────────────────────
  const ITEMS = {
    'golden-carrot': { price: 500,
      onBuy() { hasCarrot = true; show('upgrade-carrot'); }
    },
    'golden-bread':  { price: 500,
      onBuy() { hasBread = true; show('upgrade-bread'); }
    },
    'golden-egg':    { price: 1000,
      onBuy() { hasEgg = true; show('upgrade-egg'); }
    },
    'chicken': { price: 5000,
      onBuy() {
        hasChicken = true; show('animal-chicken');
        // 1 minute interval — produce 1000 + bounce
        setInterval(() => {
          count += 1000;
          countEl.textContent = count;
          updateShopPrices();
          showNotif('🐔 Tavuk yumurta yumurtladı: +1000');
          bounce('animal-chicken');
        }, 60 * 1000);
      }
    },
    'pig': { price: 5000,
      onBuy() {
        hasPig = true; show('animal-pig');
        // auto-click every 1.5s
        setInterval(() => {
          const val = getClickValue();
          count += val;
          countEl.textContent = count;
          updateShopPrices();
          bounce('animal-pig');
        }, 1500);
      }
    },
  };

  // 5-minute tick: pig eats 50
  setInterval(() => {
    if (!hasPig) return;
    count = Math.max(0, count - 50);
    countEl.textContent = count;
    updateShopPrices();
    showNotif('🐷 Domuz 50 patates yedi: -50');
    bounce('animal-pig');
  }, 5 * 60 * 1000);

  function buyItem(id) {
    const item = ITEMS[id];
    if (!item || item.bought) return;
    if (count < item.price) return;
    count -= item.price;
    item.bought = true;
    countEl.textContent = count;
    item.onBuy();
    document.getElementById('item-' + id).classList.add('purchased');
    document.getElementById('item-' + id).onclick = null;
    document.getElementById('price-' + id).innerHTML = '✔ Alındı';
    updateShopPrices();
  }

  function updateShopPrices() {
    for (const [id, item] of Object.entries(ITEMS)) {
      if (item.bought) continue;
      const p = document.getElementById('price-' + id);
      if (p) p.classList.toggle('cant-afford', count < item.price);
    }
  }

  function show(id) { document.getElementById(id).style.display = 'block'; }

  function bounce(id) {
    const el = document.getElementById(id);
    el.classList.add('bounce');
    setTimeout(() => el.classList.remove('bounce'), 300);
  }

  function showNotif(msg) {
    notif.textContent = msg;
    notif.style.opacity = '1';
    clearTimeout(notif._t);
    notif._t = setTimeout(() => notif.style.opacity = '0', 3000);
  }

  // ── Float label ────────────────────────────────────────────────────────────
  function spawnFloat(e, val) {
    const rect  = panel.getBoundingClientRect();
    const label = document.createElement('div');
    label.className = 'float-label';

    const img = document.createElement('img');
    img.src = 'potato.png';
    const txt = document.createElement('span');
    txt.textContent = '+' + val;
    label.appendChild(img);
    label.appendChild(txt);

    const dx   = (Math.random() * 80 - 40).toFixed(0) + 'px';
    const rise = -(Math.random() * 100 + 80).toFixed(0) + 'px';
    const dur  = (Math.random() * 0.55 + 0.85).toFixed(2) + 's';
    label.style.setProperty('--dx', dx);
    label.style.setProperty('--rise', rise);
    label.style.setProperty('--dur', dur);

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    label.style.left   = Math.min(Math.max(x - 20, 8), rect.width - 80) + 'px';
    label.style.bottom = Math.max(rect.height - y, 8) + 'px';

    panel.appendChild(label);
    label.addEventListener('animationend', () => label.remove());
  }
</script>
</body>
</html>
