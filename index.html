<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gold Potato Clicker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a00;
      color: #f5c518;
      font-family: 'Press Start 2P', monospace;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    #left-panel {
      width: 320px;
      min-width: 260px;
      background: #111100;
      border-right: 3px solid #f5c518;
      display: flex;
      flex-direction: column;
      padding: 18px 14px;
      gap: 16px;
    }

    #currency-bar { display: flex; align-items: center; gap: 10px; }

    #currency-icon {
      width: 36px; height: 36px;
      image-rendering: pixelated; object-fit: contain;
    }

    #currency-count {
      font-size: 22px; color: #f5c518;
      text-shadow: 0 0 8px #f5c51888;
    }

    #shop-title {
      font-size: 13px; color: #f5c518;
      letter-spacing: 3px;
      border-bottom: 2px solid #f5c51855;
      padding-bottom: 8px;
    }

    #shop-items {
      display: flex; flex-direction: column;
      gap: 10px; overflow-y: auto; flex: 1;
    }
    #shop-items::-webkit-scrollbar { width: 4px; }
    #shop-items::-webkit-scrollbar-track { background: #111100; }
    #shop-items::-webkit-scrollbar-thumb { background: #f5c51855; border-radius: 2px; }

    .shop-item {
      background: #1a1800; border: 2px solid #f5c51833;
      border-radius: 4px; padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .shop-item:hover { border-color: #f5c518aa; background: #221f00; }
    .shop-item.purchased { border-color: #f5c518; background: #2a2200; cursor: default; }
    .shop-item.purchased:hover { border-color: #f5c518; background: #2a2200; }

    .shop-item .item-icon {
      width: 32px; height: 32px;
      image-rendering: pixelated; object-fit: contain; flex-shrink: 0;
    }
    .shop-item-info { flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .item-name  { font-size: 8px; color: #f5c518cc; }
    .item-desc  { font-size: 6px; color: #f5c51666; }
    .item-price {
      display: flex; align-items: center; gap: 4px;
      font-size: 8px; color: #f5c51888; white-space: nowrap; flex-shrink: 0;
    }
    .item-price img { width: 14px; height: 14px; image-rendering: pixelated; object-fit: contain; }
    .item-price.cant-afford { opacity: 0.4; }
    .shop-item.purchased .item-price { color: #f5c518; }

    /* ── RIGHT PANEL ── */
    #right-panel {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      cursor: pointer;
      background: radial-gradient(ellipse at center, #1a1500 0%, #0a0a00 70%);
      user-select: none;
    }
    #right-panel::before {
      content: ''; position: absolute;
      width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, #f5c51814 0%, transparent 70%);
      pointer-events: none;
    }

    /* potato */
    #potato-img {
      width: 220px; height: 220px;
      image-rendering: pixelated;
      transition: transform 0.08s;
      filter: drop-shadow(0 0 28px #f5c51866);
      position: relative; z-index: 2;
    }
    #right-panel:active #potato-img,
    #right-panel:active .side-upgrade { transform: scale(0.91); }

    /* side upgrades (bread left, carrot right) — same size as potato */
    .side-upgrade {
      position: absolute;
      width: 220px; height: 220px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 0 14px #f5c51866);
      transition: transform 0.08s;
      display: none;
      top: 50%; transform: translateY(-50%);
    }
    #upgrade-bread  { left: 16px; }
    #upgrade-carrot { right: 16px; }

    /* egg — bottom center */
    #upgrade-egg {
      position: absolute;
      width: 160px; height: 160px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 0 14px #f5c51866);
      transition: transform 0.08s;
      display: none;
      bottom: 16px; left: 50%; transform: translateX(-50%);
    }
    #right-panel:active #upgrade-egg { transform: translateX(-50%) scale(0.91); }

    /* passive animals — bottom corners */
    .animal-icon {
      position: absolute;
      width: 80px; height: 80px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 0 8px #f5c51844);
      display: none; bottom: 16px;
      pointer-events: none;
    }
    #animal-chicken { left: 16px; }
    #animal-pig     { right: 16px; }

    /* passive notification */
    #passive-notif {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #1a1800; border: 2px solid #f5c518;
      color: #f5c518; font-size: 9px;
      padding: 8px 14px; border-radius: 6px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
      z-index: 99;
    }

    /* float labels */
    .float-label {
      position: absolute; display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: #f5c518;
      text-shadow: 0 0 6px #f5c518bb;
      pointer-events: none;
      animation: floatUp var(--dur, 1.1s) ease-out forwards;
      white-space: nowrap;
    }
    .float-label img {
      width: 18px; height: 18px;
      image-rendering: pixelated; object-fit: contain;
    }
    @keyframes floatUp {
      0%   { opacity:1; transform: translateY(0) translateX(var(--dx,0px)) scale(1); }
      15%  { transform: translateY(calc(var(--rise,-110px)*.1)) translateX(calc(var(--dx,0px)*.3)) scale(1.15); }
      100% { opacity:0; transform: translateY(var(--rise,-110px)) translateX(var(--dx,0px)) scale(0.8); }
    }
  </style>
</head>
<body>

<!-- LEFT -->
<div id="left-panel">
  <div id="currency-bar">
    <img id="currency-icon" src="potato.png" alt="potato" />
    <span id="currency-count">0</span>
  </div>
  <div id="shop-title">SHOP</div>
  <div id="shop-items">

    <div class="shop-item" id="item-golden-carrot" onclick="buyItem('golden-carrot')">
      <img class="item-icon" src="Golden_Carrot_JE4_BE2.png" alt="Altın Havuç" />
      <div class="shop-item-info">
        <span class="item-name">Altın Havuç</span>
        <span class="item-desc">Tıklama +1 (sağda)</span>
      </div>
      <span class="item-price" id="price-golden-carrot">500 <img src="potato.png" alt="" /></span>
    </div>

    <div class="shop-item" id="item-golden-bread" onclick="buyItem('golden-bread')">
      <img class="item-icon" src="golden_bread.png" alt="Altın Ekmek" />
      <div class="shop-item-info">
        <span class="item-name">Altın Ekmek</span>
        <span class="item-desc">Tıklama +1 (solda)</span>
      </div>
      <span class="item-price" id="price-golden-bread">500 <img src="potato.png" alt="" /></span>
    </div>

    <div class="shop-item" id="item-golden-egg" onclick="buyItem('golden-egg')">
      <img class="item-icon" src="golden_egg.png" alt="Altın Yumurta" />
      <div class="shop-item-info">
        <span class="item-name">Altın Yumurta</span>
        <span class="item-desc">Tıklamayı 2x katlar</span>
      </div>
      <span class="item-price" id="price-golden-egg">5000 <img src="potato.png" alt="" /></span>
    </div>

    <div class="shop-item" id="item-chicken" onclick="buyItem('chicken')">
      <img class="item-icon" src="chicken.png" alt="Tavuk" />
      <div class="shop-item-info">
        <span class="item-name">Tavuk</span>
        <span class="item-desc">5dk'da +1000 patates</span>
      </div>
      <span class="item-price" id="price-chicken">6000 <img src="potato.png" alt="" /></span>
    </div>

    <div class="shop-item" id="item-pig" onclick="buyItem('pig')">
      <img class="item-icon" src="pig.png" alt="Domuz" />
      <div class="shop-item-info">
        <span class="item-name">Domuz</span>
        <span class="item-desc">5dk'da -500 patates</span>
      </div>
      <span class="item-price" id="price-pig">7000 <img src="potato.png" alt="" /></span>
    </div>

  </div>
</div>

<!-- RIGHT -->
<div id="right-panel">
  <img class="side-upgrade" id="upgrade-bread"  src="golden_bread.png"        alt="Altın Ekmek"   draggable="false" />
  <img id="potato-img"                           src="potato.png"              alt="potato"        draggable="false" />
  <img class="side-upgrade" id="upgrade-carrot"  src="Golden_Carrot_JE4_BE2.png" alt="Altın Havuç" draggable="false" />
  <img id="upgrade-egg"                          src="golden_egg.png"          alt="Altın Yumurta" draggable="false" />
  <img class="animal-icon"  id="animal-chicken"  src="chicken.png"             alt="Tavuk" />
  <img class="animal-icon"  id="animal-pig"      src="pig.png"                 alt="Domuz" />
</div>

<div id="passive-notif"></div>

<script>
  let count     = 0;
  let hasCarrot = false, hasBread = false, hasEgg = false;
  let hasChicken = false, hasPig = false;

  const countEl = document.getElementById('currency-count');
  const panel   = document.getElementById('right-panel');
  const notif   = document.getElementById('passive-notif');

  function getClickValue() {
    let v = 1;
    if (hasCarrot) v += 1;
    if (hasBread)  v += 1;
    if (hasEgg)    v *= 2;
    return v;
  }

  panel.addEventListener('click', (e) => {
    const val = getClickValue();
    count += val;
    countEl.textContent = count;
    spawnFloat(e, val);
    updateShopPrices();
  });

  const ITEMS = {
    'golden-carrot': {
      price: 500,
      onBuy() {
        hasCarrot = true;
        document.getElementById('upgrade-carrot').style.display = 'block';
      }
    },
    'golden-bread': {
      price: 500,
      onBuy() {
        hasBread = true;
        document.getElementById('upgrade-bread').style.display = 'block';
      }
    },
    'golden-egg': {
      price: 5000,
      onBuy() {
        hasEgg = true;
        document.getElementById('upgrade-egg').style.display = 'block';
      }
    },
    'chicken': {
      price: 6000,
      onBuy() {
        hasChicken = true;
        document.getElementById('animal-chicken').style.display = 'block';
      }
    },
    'pig': {
      price: 7000,
      onBuy() {
        hasPig = true;
        document.getElementById('animal-pig').style.display = 'block';
      }
    }
  };

  function buyItem(id) {
    const item = ITEMS[id];
    if (!item || item.bought) return;
    if (count < item.price) return;
    count -= item.price;
    item.bought = true;
    countEl.textContent = count;
    item.onBuy();
    const el = document.getElementById('item-' + id);
    el.classList.add('purchased');
    el.onclick = null;
    document.getElementById('price-' + id).innerHTML = '✔ Alındı';
    updateShopPrices();
  }

  function updateShopPrices() {
    for (const [id, item] of Object.entries(ITEMS)) {
      if (item.bought) continue;
      const p = document.getElementById('price-' + id);
      if (p) p.classList.toggle('cant-afford', count < item.price);
    }
  }

  // ── Passive tick every 5 minutes ─────────────────────────────────────────
  setInterval(() => {
    let delta = 0;
    if (hasChicken) delta += 1000;
    if (hasPig)     delta -= 500;
    if (delta === 0) return;

    count = Math.max(0, count + delta);
    countEl.textContent = count;
    updateShopPrices();

    const sign = delta > 0 ? '+' : '';
    showNotif(`Pasif gelir: ${sign}${delta} 🥔`);
  }, 5 * 60 * 1000);

  function showNotif(msg) {
    notif.textContent = msg;
    notif.style.opacity = '1';
    clearTimeout(notif._t);
    notif._t = setTimeout(() => notif.style.opacity = '0', 3000);
  }

  // ── Float label ───────────────────────────────────────────────────────────
  function spawnFloat(e, val) {
    const rect  = panel.getBoundingClientRect();
    const label = document.createElement('div');
    label.className = 'float-label';

    const img = document.createElement('img');
    img.src = 'potato.png';
    const txt = document.createElement('span');
    txt.textContent = '+' + val;

    label.appendChild(img);
    label.appendChild(txt);

    const dx   = (Math.random() * 80 - 40).toFixed(0) + 'px';
    const rise = -(Math.random() * 100 + 80).toFixed(0) + 'px';
    const dur  = (Math.random() * 0.55 + 0.85).toFixed(2) + 's';

    label.style.setProperty('--dx',   dx);
    label.style.setProperty('--rise', rise);
    label.style.setProperty('--dur',  dur);

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    label.style.left   = Math.min(Math.max(x - 20, 8), rect.width - 80) + 'px';
    label.style.bottom = Math.max(rect.height - y, 8) + 'px';

    panel.appendChild(label);
    label.addEventListener('animationend', () => label.remove());
  }
</script>
</body>
</html>
